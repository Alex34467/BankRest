databaseChangeLog:
  - changeSet:
      id: 1
      author: alexey
      changes:
        - sql:
            DBMS: postgresql
            sql: CREATE TYPE card_status AS ENUM ('ACTIVE', 'BLOCKED', 'EXPIRED');

  - changeSet:
      id: 2
      author: alexey
      changes:
        - sql:
            DBMS: postgresql
            sql: CREATE TYPE user_role AS ENUM ('ADMIN', 'USER');

  - changeSet:
      id: 3
      author: alexey
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: username
                  type: VARCHAR
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uk_user_username
              - column:
                  name: email
                  type: VARCHAR
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uk_user_email
              - column:
                  name: password
                  type: VARCHAR
                  constraints:
                    nullable: false
              - column:
                  name: role
                  type: user_role
                  constraints:
                    nullable: false

  - changeSet:
      id: 4
      author: alexey
      changes:
        - createTable:
            tableName: cards
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: number
                  type: VARCHAR(16)
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uk_card_number
              - column:
                  name: owner_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_card_owner_id
                    references: users(id)
              - column:
                  name: expiration_date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: card_status
                  constraints:
                    nullable: false
              - column:
                  name: balance
                  type: DECIMAL(15, 2)
                  constraints:
                    nullable: false

  - changeSet:
      id: 5
      author: alexey
      comment: 'Create users'
      changes:
        - insert:
            tableName: users
            columns:
              - column:
                  name: username
                  value: 'Admin'
              - column:
                  name: email
                  value: 'admin@test.com'
              - column:
                  name: password
                  value: '$2a$10$sseaJsvoNHd5J1GCXbdEt.ywyzWVaVyWUXYmjiitnr/Iq4UxHwe9q'
              - column:
                  name: role
                  value: 'ADMIN'
        - insert:
            tableName: users
            columns:
              - column:
                  name: username
                  value: 'User1'
              - column:
                  name: email
                  value: 'user1@test.com'
              - column:
                  name: password
                  value: '$2a$10$sseaJsvoNHd5J1GCXbdEt.ywyzWVaVyWUXYmjiitnr/Iq4UxHwe9q'
              - column:
                  name: role
                  value: 'USER'
        - insert:
            tableName: users
            columns:
              - column:
                  name: username
                  value: 'User2'
              - column:
